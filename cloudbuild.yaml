# ═══════════════════════════════════════════════════════════════════════════════
# EcoQuest — Cloud Build Configuration
# Parallel build steps with layer caching enabled.
# ═══════════════════════════════════════════════════════════════════════════════

substitutions:
  _REGION: asia-south1
  _AR_REPO: ecoquest-registry
  _BACKEND_SERVICE: ecoquest-backend
  _FRONTEND_SERVICE: ecoquest-frontend

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

steps:

  # ── Build backend image (with layer cache) ───────────────────────────────
  - id: build-backend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --cache-from
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/backend:latest
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/backend:$COMMIT_SHA
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/backend:latest
      - --file
      - backend/Dockerfile
      - backend/
    waitFor: ['-']   # Start immediately (parallel)

  # ── Build frontend image (parallel with backend) ─────────────────────────
  - id: build-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --cache-from
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/frontend:latest
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/frontend:$COMMIT_SHA
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/frontend:latest
      - --file
      - frontend/Dockerfile
      - frontend/
    waitFor: ['-']   # Parallel with build-backend

  # ── Push backend image ────────────────────────────────────────────────────
  - id: push-backend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/backend
    waitFor: [build-backend]

  # ── Push frontend image ───────────────────────────────────────────────────
  - id: push-frontend
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/frontend
    waitFor: [build-frontend]

  # ── Run unit tests inside backend image ──────────────────────────────────
  - id: run-unit-tests
    name: ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/backend:$COMMIT_SHA
    entrypoint: python
    args:
      - -m
      - pytest
      - tests/unit/
      - --tb=short
      - -q
    env:
      - GCP_PROJECT_ID=$PROJECT_ID
      - ENVIRONMENT=test
    waitFor: [push-backend]

  # ── Deploy backend to Cloud Run ───────────────────────────────────────────
  - id: deploy-backend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_BACKEND_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/backend:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --min-instances=1
      - --max-instances=10
      - --memory=512Mi
      - --cpu=1
      - --concurrency=80
      - --timeout=300
      - --set-env-vars=GCP_PROJECT_ID=$PROJECT_ID,ENVIRONMENT=production
      - --quiet
    waitFor: [run-unit-tests]

  # ── Deploy frontend to Cloud Run (parallel with backend deploy) ───────────
  - id: deploy-frontend
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_FRONTEND_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/frontend:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --min-instances=0
      - --max-instances=5
      - --memory=256Mi
      - --allow-unauthenticated
      - --quiet
    waitFor: [push-frontend]

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/backend:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/backend:latest
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/frontend:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/frontend:latest
